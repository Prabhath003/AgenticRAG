[project.optional-dependencies]
dev = [
    "pytest==8.4.2",
    "pytest-cov>=4.1.0",
    "black>=23.0.0",
    "isort>=5.13.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
]
gpu = [
    "faiss-gpu==1.7.2",
    "torch==2.8.0",
]
docs = [
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=1.3.0",
]

[project.urls]
Homepage = "https://github.com/Prabhath003/AgenticRAG"
Repository = "https://github.com/Prabhath003/AgenticRAG.git"
Documentation = "https://github.com/Prabhath003/AgenticRAG#documentation"
Issues = "https://github.com/Prabhath003/AgenticRAG/issues"

[tool.setuptools]
packages = ["src", "src.core", "src.core.agents", "src.infrastructure", "src.infrastructure.storage", "src.infrastructure.file_processor", "src.infrastructure.clients", "src.infrastructure.database", "src.config", "src.utils"]

[tool.setuptools.package-data]
src = ["**/*.py"]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"

[tool.black]
line-length = 100
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_gitignore = true
known_first_party = ["src"]

[tool.mypy]
python_version = "3.12"
warn_return_any = false
warn_unused_configs = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
ignore_missing_imports = true
no_error_summary = false
explicit_package_bases = true
