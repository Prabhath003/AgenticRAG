[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentic-rag"
version = "1.0.0"
description = "A high-performance, production-ready Retrieval-Augmented Generation (RAG) system with entity-scoped isolation, JSON storage, and complete REST API"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Prabhath Chellingi", email = "prabhathchellingi2003@gmail.com"}
]
keywords = [
    "rag",
    "retrieval-augmented-generation",
    "fastapi",
    "entity-scoped",
    "vector-search",
    "faiss",
    "llm",
    "generative-ai"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Web Environment",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10"

dependencies = [
    "aiohttp==3.12.15",
    "aiosignal==1.4.0",
